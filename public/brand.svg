<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
  <!-- Solid dark background -->
  <rect width="48" height="48" rx="7" fill="#0c1524"/>

  <!-- Outer gold border -->
  <rect x="1.5" y="1.5" width="45" height="45" rx="6" fill="none" stroke="#c9a227" stroke-width="1.3"/>

  <!-- Inner gold border (double-line luxury touch) -->
  <rect x="4.5" y="4.5" width="39" height="39" rx="3.5" fill="none" stroke="#c9a227" stroke-width="0.55" opacity="0.5"/>

  <!-- Top ornamental rule -->
  <line x1="13" y1="16" x2="35" y2="16" stroke="#c9a227" stroke-width="0.6" opacity="0.4"/>

  <!-- ZM lettermark -->
  <text
    x="24"
    y="30"
    text-anchor="middle"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="17"
    font-weight="700"
    fill="#c9a227"
    letter-spacing="2"
  >ZM</text>

  <!-- Bottom ornamental rule -->
  <line x1="13" y1="34" x2="35" y2="34" stroke="#c9a227" stroke-width="0.6" opacity="0.4"/>
</svg>
