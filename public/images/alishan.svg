<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#050f0d"/>
      <stop offset="100%" stop-color="#082820"/>
    </linearGradient>
    <linearGradient id="teal" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0d9488" stop-opacity="0"/>
      <stop offset="18%" stop-color="#0d9488"/>
      <stop offset="82%" stop-color="#0d9488"/>
      <stop offset="100%" stop-color="#0d9488" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="letterTeal" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#5eead4"/>
      <stop offset="50%" stop-color="#0d9488"/>
      <stop offset="100%" stop-color="#065f46"/>
    </linearGradient>
    <pattern id="dots" width="44" height="44" patternUnits="userSpaceOnUse">
      <circle cx="22" cy="22" r="0.8" fill="#0d9488" opacity="0.14"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect width="1600" height="900" fill="url(#dots)"/>

  <!-- Top & bottom accent bars -->
  <rect width="1600" height="6" fill="#0d9488" opacity="0.65"/>
  <rect y="894" width="1600" height="6" fill="#0d9488" opacity="0.65"/>

  <!-- Outer frame -->
  <rect x="48" y="48" width="1504" height="804" fill="none" stroke="#0d9488" stroke-width="1.4" opacity="0.35"/>
  <!-- Inner frame -->
  <rect x="70" y="70" width="1460" height="760" fill="none" stroke="#0d9488" stroke-width="0.6" opacity="0.18"/>

  <!-- Corner accents -->
  <polyline points="48,118 48,48 118,48" fill="none" stroke="#0d9488" stroke-width="2.5" opacity="0.6"/>
  <polyline points="1482,48 1552,48 1552,118" fill="none" stroke="#0d9488" stroke-width="2.5" opacity="0.6"/>
  <polyline points="48,782 48,852 118,852" fill="none" stroke="#0d9488" stroke-width="2.5" opacity="0.6"/>
  <polyline points="1482,852 1552,852 1552,782" fill="none" stroke="#0d9488" stroke-width="2.5" opacity="0.6"/>

  <!-- Top ornament — upward arrow/chevron (signifies "grand") -->
  <polygon points="800,108 840,165 800,148 760,165" fill="#0d9488" opacity="0.6"/>
  <line x1="800" y1="108" x2="800" y2="185" stroke="#0d9488" stroke-width="1.2" opacity="0.4"/>

  <!-- Horizontal rules -->
  <line x1="130" y1="315" x2="1470" y2="315" stroke="url(#teal)" stroke-width="1.2"/>
  <line x1="130" y1="575" x2="1470" y2="575" stroke="url(#teal)" stroke-width="1.2"/>

  <!-- ALISHAN wordmark -->
  <text x="800" y="545"
    text-anchor="middle"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="210" font-weight="700"
    letter-spacing="18"
    fill="url(#letterTeal)"
  >ALISHAN</text>

  <!-- TRANSPORT -->
  <text x="800" y="655"
    text-anchor="middle"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="54" font-weight="400"
    letter-spacing="28"
    fill="white" fill-opacity="0.72"
  >TRANSPORT</text>

  <!-- Tagline -->
  <text x="800" y="740"
    text-anchor="middle"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="22"
    letter-spacing="10"
    fill="#0d9488" fill-opacity="0.5"
  >DHAKA  ·  BANGLADESH</text>

  <!-- Bottom ornament -->
  <line x1="760" y1="805" x2="840" y2="805" stroke="#0d9488" stroke-width="1" opacity="0.4"/>
  <circle cx="800" cy="820" r="6" fill="none" stroke="#0d9488" stroke-width="1.2" opacity="0.4"/>
</svg>
