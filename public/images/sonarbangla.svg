<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0e0900"/>
      <stop offset="100%" stop-color="#1c1200"/>
    </linearGradient>
    <linearGradient id="amber" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#d97706" stop-opacity="0"/>
      <stop offset="18%" stop-color="#d97706"/>
      <stop offset="82%" stop-color="#d97706"/>
      <stop offset="100%" stop-color="#d97706" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="letterAmber" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fde68a"/>
      <stop offset="45%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#92400e"/>
    </linearGradient>
    <pattern id="dots" width="44" height="44" patternUnits="userSpaceOnUse">
      <circle cx="22" cy="22" r="0.8" fill="#d97706" opacity="0.13"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect width="1600" height="900" fill="url(#dots)"/>

  <!-- Top & bottom accent bars -->
  <rect width="1600" height="6" fill="#d97706" opacity="0.65"/>
  <rect y="894" width="1600" height="6" fill="#d97706" opacity="0.65"/>

  <!-- Outer frame -->
  <rect x="48" y="48" width="1504" height="804" fill="none" stroke="#d97706" stroke-width="1.4" opacity="0.35"/>
  <!-- Inner frame -->
  <rect x="70" y="70" width="1460" height="760" fill="none" stroke="#d97706" stroke-width="0.6" opacity="0.18"/>

  <!-- Corner accents -->
  <polyline points="48,118 48,48 118,48" fill="none" stroke="#d97706" stroke-width="2.5" opacity="0.6"/>
  <polyline points="1482,48 1552,48 1552,118" fill="none" stroke="#d97706" stroke-width="2.5" opacity="0.6"/>
  <polyline points="48,782 48,852 118,852" fill="none" stroke="#d97706" stroke-width="2.5" opacity="0.6"/>
  <polyline points="1482,852 1552,852 1552,782" fill="none" stroke="#d97706" stroke-width="2.5" opacity="0.6"/>

  <!-- Top ornament — sun rays (Sonar = golden/sun) -->
  <circle cx="800" cy="148" r="22" fill="none" stroke="#d97706" stroke-width="1.8" opacity="0.55"/>
  <circle cx="800" cy="148" r="10" fill="#d97706" opacity="0.45"/>
  <!-- Ray lines -->
  <line x1="800" y1="110" x2="800" y2="100" stroke="#d97706" stroke-width="1.5" opacity="0.4"/>
  <line x1="826" y1="122" x2="834" y2="114" stroke="#d97706" stroke-width="1.5" opacity="0.4"/>
  <line x1="838" y1="148" x2="848" y2="148" stroke="#d97706" stroke-width="1.5" opacity="0.4"/>
  <line x1="826" y1="174" x2="834" y2="182" stroke="#d97706" stroke-width="1.5" opacity="0.4"/>
  <line x1="774" y1="122" x2="766" y2="114" stroke="#d97706" stroke-width="1.5" opacity="0.4"/>
  <line x1="762" y1="148" x2="752" y2="148" stroke="#d97706" stroke-width="1.5" opacity="0.4"/>
  <line x1="774" y1="174" x2="766" y2="182" stroke="#d97706" stroke-width="1.5" opacity="0.4"/>

  <!-- Horizontal rules -->
  <line x1="130" y1="305" x2="1470" y2="305" stroke="url(#amber)" stroke-width="1.2"/>
  <line x1="130" y1="555" x2="1470" y2="555" stroke="url(#amber)" stroke-width="1.2"/>

  <!-- SONAR in amber -->
  <text x="800" y="460"
    text-anchor="middle"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="175" font-weight="700"
    letter-spacing="25"
    fill="url(#letterAmber)"
  >SONAR</text>

  <!-- BANGLA in white, slightly smaller -->
  <text x="800" y="560"
    text-anchor="middle"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="130" font-weight="700"
    letter-spacing="20"
    fill="white" fill-opacity="0.82"
  >BANGLA</text>

  <!-- TRANSPORT AGENCY -->
  <text x="800" y="660"
    text-anchor="middle"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="46" font-weight="400"
    letter-spacing="22"
    fill="white" fill-opacity="0.6"
  >TRANSPORT AGENCY</text>

  <!-- Location -->
  <text x="800" y="740"
    text-anchor="middle"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="22"
    letter-spacing="10"
    fill="#d97706" fill-opacity="0.45"
  >DHAKA  ·  BANGLADESH</text>

  <!-- Bottom line ornament -->
  <line x1="680" y1="800" x2="740" y2="800" stroke="#d97706" stroke-width="1" opacity="0.35"/>
  <circle cx="800" cy="800" r="7" fill="none" stroke="#d97706" stroke-width="1.2" opacity="0.35"/>
  <line x1="860" y1="800" x2="920" y2="800" stroke="#d97706" stroke-width="1" opacity="0.35"/>
</svg>
