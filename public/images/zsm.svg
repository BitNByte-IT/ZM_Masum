<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#050c1a"/>
      <stop offset="100%" stop-color="#0c2040"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#c9a227" stop-opacity="0"/>
      <stop offset="18%" stop-color="#c9a227"/>
      <stop offset="82%" stop-color="#c9a227"/>
      <stop offset="100%" stop-color="#c9a227" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="letterGold" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f0d060"/>
      <stop offset="50%" stop-color="#c9a227"/>
      <stop offset="100%" stop-color="#9a7010"/>
    </linearGradient>
    <pattern id="dots" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="0.8" fill="#c9a227" opacity="0.12"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect width="1600" height="900" fill="url(#dots)"/>

  <!-- Top & bottom gold bars -->
  <rect width="1600" height="6" fill="#c9a227" opacity="0.65"/>
  <rect y="894" width="1600" height="6" fill="#c9a227" opacity="0.65"/>

  <!-- Outer frame -->
  <rect x="48" y="48" width="1504" height="804" fill="none" stroke="#c9a227" stroke-width="1.4" opacity="0.35"/>
  <!-- Inner frame -->
  <rect x="70" y="70" width="1460" height="760" fill="none" stroke="#c9a227" stroke-width="0.6" opacity="0.18"/>

  <!-- Corner accents top-left -->
  <polyline points="48,118 48,48 118,48" fill="none" stroke="#c9a227" stroke-width="2.5" opacity="0.6"/>
  <!-- Corner accents top-right -->
  <polyline points="1482,48 1552,48 1552,118" fill="none" stroke="#c9a227" stroke-width="2.5" opacity="0.6"/>
  <!-- Corner accents bottom-left -->
  <polyline points="48,782 48,852 118,852" fill="none" stroke="#c9a227" stroke-width="2.5" opacity="0.6"/>
  <!-- Corner accents bottom-right -->
  <polyline points="1482,852 1552,852 1552,782" fill="none" stroke="#c9a227" stroke-width="2.5" opacity="0.6"/>

  <!-- Top diamond ornament -->
  <polygon points="800,130 820,155 800,180 780,155" fill="#c9a227" opacity="0.55"/>
  <polygon points="800,138 814,155 800,172 786,155" fill="#050c1a" opacity="0.7"/>

  <!-- Thin horizontal rule above wordmark -->
  <line x1="130" y1="315" x2="1470" y2="315" stroke="url(#gold)" stroke-width="1.2"/>
  <!-- Thin rule — tight under wordmark -->
  <line x1="130" y1="585" x2="1470" y2="585" stroke="url(#gold)" stroke-width="1.2"/>

  <!-- ZSM wordmark -->
  <text x="800" y="550"
    text-anchor="middle"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="230" font-weight="700"
    letter-spacing="20"
    fill="url(#letterGold)"
  >ZSM</text>

  <!-- TRANSPORT AGENCY -->
  <text x="800" y="660"
    text-anchor="middle"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="50" font-weight="400"
    letter-spacing="22"
    fill="white" fill-opacity="0.78"
  >TRANSPORT AGENCY</text>

  <!-- Location line -->
  <text x="800" y="745"
    text-anchor="middle"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="22"
    letter-spacing="10"
    fill="#c9a227" fill-opacity="0.45"
  >DHAKA  ·  BANGLADESH</text>

  <!-- Bottom diamond ornament -->
  <polygon points="800,800 812,818 800,836 788,818" fill="#c9a227" opacity="0.4"/>
</svg>
